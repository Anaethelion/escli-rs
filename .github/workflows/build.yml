name: Build and Test CLI

on:
  push:
    branches: [ main ]
    paths:
      - generator/**
      - escli/**
      - Cargo.toml
  pull_request:
    branches: [ main ]
    paths:
      - generator/**
      - escli/**
      - Cargo.toml

jobs:
  test:
    name: Test on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Generate
        run: cargo run -p generator --profile release
      - name: Test
        run: cargo test

  build:
    name: Build on ${{ matrix.os }}
    if: github.event_name == 'push'
    needs: test
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        include:
          - os: ubuntu-latest
            artifact-name: escli-linux
            artifact-path: target/release/escli
          - os: macos-latest
            artifact-name: escli-macos
            artifact-path: target/release/escli
          - os: windows-latest
            artifact-name: escli-windows
            artifact-path: target\release\escli.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Generate
        run: cargo run -p generator --profile release
      - name: Build
        run: cargo build -p escli --profile release
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
