name: Build and Test CLI

on:
  push:
    branches: [ main ]
    paths:
      - generator/**
      - escli/**
      - Cargo.toml
  pull_request:
    branches: [ main ]
    paths:
      - generator/**
      - escli/**
      - Cargo.toml

jobs:
  test:
    name: Test on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      # Debug build of generator is fast; it runs in milliseconds regardless of
      # optimization level, so release mode buys nothing here.
      - name: Generate
        run: cargo run -p generator
      - name: Test
        run: cargo test

  generate:
    name: Generate source
    if: github.event_name == 'push'
    needs: [ test ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Generate
        run: cargo run -p generator --profile release
      # Share the generated escli/src/ with every build platform so the
      # generator is only compiled once instead of three times.
      - name: Upload generated source
        uses: actions/upload-artifact@v7
        with:
          name: generated-src
          path: escli/src/

  build:
    name: Build on ${{ matrix.os }}
    if: github.event_name == 'push'
    needs: generate
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        include:
          - os: ubuntu-latest
            artifact-name: escli-linux
            artifact-path: target/release/escli
          - os: macos-latest
            artifact-name: escli-macos
            artifact-path: target/release/escli
          - os: windows-latest
            artifact-name: escli-windows
            artifact-path: target\release\escli.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Download generated source
        uses: actions/download-artifact@v8
        with:
          name: generated-src
          path: escli/src/
      - name: Build
        run: cargo build -p escli --profile release
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
