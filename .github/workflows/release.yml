name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - name: Bump version in Cargo.toml
        run: |
          VERSION="${{ inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" escli/Cargo.toml
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Commit and push
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add escli/Cargo.toml
          if git diff --staged --quiet; then
            echo "No version change needed"
          else
            git commit -m "chore: bump version to ${{ env.VERSION }}"
            git push origin main
          fi
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  generate:
    needs: bump-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump-version.outputs.sha }}
      - uses: Swatinem/rust-cache@v2
      - name: Generate
        run: cargo run -p generator --profile release
      - name: Upload generated source
        uses: actions/upload-artifact@v7
        with:
          name: generated-src
          path: escli/src/

  build:
    needs: [ bump-version, generate ]
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: escli-linux-amd64
            artifact-path: target/x86_64-unknown-linux-musl/release/escli
            cargo-target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            artifact-name: escli-linux-arm64
            artifact-path: target/aarch64-unknown-linux-musl/release/escli
            cargo-target: aarch64-unknown-linux-musl
          - os: macos-latest
            artifact-name: escli-macos
            artifact-path: target/release/escli
            cargo-target: ''
          - os: windows-latest
            artifact-name: escli-windows
            artifact-path: target/release/escli.exe
            cargo-target: ''
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump-version.outputs.sha }}
      - uses: Swatinem/rust-cache@v2
      - name: Download generated source
        uses: actions/download-artifact@v8
        with:
          name: generated-src
          path: escli/src/
      - name: Install musl tools
        if: matrix.cargo-target != ''
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q musl-tools
          rustup target add ${{ matrix.cargo-target }}
      - name: Build
        shell: bash
        run: |
          TARGET="${{ matrix.cargo-target }}"
          cargo build -p escli --profile release ${TARGET:+--target $TARGET}
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  publish-docker:
    needs: build
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/publish-docker.yml
    with:
      version: ${{ inputs.tag || github.ref_name }}
      binaries-provided: true

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/escli-linux-amd64/escli release-assets/escli-linux-amd64
          chmod +x release-assets/escli-linux-amd64
          cp artifacts/escli-linux-arm64/escli release-assets/escli-linux-arm64
          chmod +x release-assets/escli-linux-arm64
          cp artifacts/escli-macos/escli release-assets/escli-macos
          chmod +x release-assets/escli-macos
          cp artifacts/escli-windows/escli.exe release-assets/escli-windows.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          prerelease: true
          generate_release_notes: true
          files: |
            release-assets/escli-linux-amd64
            release-assets/escli-linux-arm64
            release-assets/escli-macos
            release-assets/escli-windows.exe
