name: Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the image (e.g., v1.2.3). Defaults to latest only.'
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version tag for the image (e.g., v1.2.3)'
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version tag
        id: vars
        run: |
          VERSION="${{ inputs.version }}"
          echo "has_version=$([ -n "$VERSION" ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build for amd64
      - name: Build amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            CARGO_BUILD_TARGET=x86_64-unknown-linux-musl
          tags: |
            ghcr.io/anaethelion/escli:latest-amd64
            ${{ steps.vars.outputs.has_version == 'true' && format('ghcr.io/anaethelion/escli:{0}-amd64', steps.vars.outputs.version) || '' }}
          outputs: type=registry

      # Build for arm64
      - name: Build arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          build-args: |
            CARGO_BUILD_TARGET=aarch64-unknown-linux-musl
          tags: |
            ghcr.io/anaethelion/escli:latest-arm64
            ${{ steps.vars.outputs.has_version == 'true' && format('ghcr.io/anaethelion/escli:{0}-arm64', steps.vars.outputs.version) || '' }}
          outputs: type=registry

      # Create and push multi-arch manifest
      - name: Create and push multi-arch manifest
        run: |
          EXTRA_TAGS=""
          if [ "${{ steps.vars.outputs.has_version }}" = "true" ]; then
            EXTRA_TAGS="-t ghcr.io/anaethelion/escli:${{ steps.vars.outputs.version }}"
          fi
          docker buildx imagetools create \
            -t ghcr.io/anaethelion/escli:latest \
            $EXTRA_TAGS \
            ghcr.io/anaethelion/escli:latest-amd64 \
            ghcr.io/anaethelion/escli:latest-arm64
