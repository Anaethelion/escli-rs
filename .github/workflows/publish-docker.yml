name: Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the image (e.g., v1.2.3). Defaults to latest only.'
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Version tag for the image (e.g., v1.2.3)'
        required: true
        type: string

jobs:
  # Compiles musl binaries when triggered manually.
  # Skipped on workflow_call — the release workflow already provides the artifacts.
  build-binaries:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            cargo-target: x86_64-unknown-linux-musl
            artifact: escli-linux-amd64
          - runner: ubuntu-24.04-arm
            cargo-target: aarch64-unknown-linux-musl
            artifact: escli-linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q musl-tools
          rustup target add ${{ matrix.cargo-target }}
      - name: Generate
        run: cargo run -p generator --profile release
      - name: Build
        run: cargo build -p escli --profile release --target ${{ matrix.cargo-target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.cargo-target }}/release/escli

  build:
    needs: build-binaries
    if: always() && (needs.build-binaries.result == 'success' || needs.build-binaries.result == 'skipped')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            artifact: escli-linux-amd64
          - arch: arm64
            artifact: escli-linux-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: docker-context/

      - name: Prepare build context
        run: chmod +x docker-context/escli

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: docker-context/
          file: Dockerfile
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: |
            ghcr.io/anaethelion/escli:latest-${{ matrix.arch }}
            ${{ inputs.version != '' && format('ghcr.io/anaethelion/escli:{0}-{1}', inputs.version, matrix.arch) || '' }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          EXTRA_TAGS=""
          if [ -n "${{ inputs.version }}" ]; then
            EXTRA_TAGS="-t ghcr.io/anaethelion/escli:${{ inputs.version }}"
          fi
          docker buildx imagetools create \
            -t ghcr.io/anaethelion/escli:latest \
            $EXTRA_TAGS \
            ghcr.io/anaethelion/escli:latest-amd64 \
            ghcr.io/anaethelion/escli:latest-arm64
